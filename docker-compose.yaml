services:
  db:
    image: postgres:16
    container_name: pim_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/src/db/init:/docker-entrypoint-initdb.d

  api:
    build: ./api
    container_name: pim_api
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

  frontend:
    build: ./web
    container_name: pim_web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata: